spring:
  datasource:
    url: jdbc:postgresql://ai-db:5432/ai_dev
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: dev-placeholder
            client-secret: dev-placeholder
          google:
            client-id: dev-placeholder
            client-secret: dev-placeholder
          gitlab:
            client-id: dev-placeholder
            client-secret: dev-placeholder

management:
  otlp:
    tracing:
      export:
        enabled: false
  tracing:
    enabled: false

logging:
  level:
    root: INFO
    com.atlasia.ai: INFO
    org.springframework: WARN
    org.hibernate: WARN
    io.opentelemetry: ERROR
    io.grpc: ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [correlationId=%X{correlationId:-N/A}] [runId=%X{runId:-N/A}] [userId=%X{userId:-N/A}] [agent=%X{agent:-N/A}] - %msg%n"

