# Testcontainers Cloud Configuration
# https://testcontainers.cloud/docs

# Enable Testcontainers Cloud
testcontainers.cloud.enabled=true

# Reuse containers between test runs (optional, for performance)
testcontainers.reuse.enable=true

# Cloud service endpoint (uses default cloud API)
testcontainers.cloudServiceEndpoint=cloud-api.testcontainers.cloud

# Docker socket configuration (auto-detected, can be overridden)
# testcontainers.dockerClient.strategy=unix

# Logging configuration
testcontainers.messages.enabled=true

# Image pull policy
testcontainers.image.pullPolicy=DEFAULT

# Debug mode (optional, set to true for verbose logging)
testcontainers.debug=false
