spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        enable_lazy_load_no_trans: true
  flyway:
    enabled: true
  cloud:
    vault:
      enabled: false
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: test-github-id
            client-secret: test-github-secret
            scope: user:email,read:user
          google:
            client-id: test-google-id
            client-secret: test-google-secret
            scope: email,profile
          gitlab:
            client-id: test-gitlab-id
            client-secret: test-gitlab-secret
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: read_user,email
        provider:
          gitlab:
            authorization-uri: https://gitlab.com/oauth/authorize
            token-uri: https://gitlab.com/oauth/token
            user-info-uri: https://gitlab.com/api/v4/user
            user-name-attribute: id

otel:
  exporter:
    otlp:
      # Dummy endpoint so OTLP beans initialise without errors; nothing is exported in tests.
      endpoint: http://localhost:4317

atlasia:
  jwt:
    secret-key: test-secret-key-for-unit-tests-must-be-at-least-256-bits-long-for-hmac-sha512-algorithm
  cors:
    allowed-origins: http://localhost:4200
  oauth2:
    github:
      client-id: test-client-id
      client-secret: test-client-secret
    google:
      client-id: test-client-id
      client-secret: test-client-secret
    gitlab:
      client-id: test-client-id
      client-secret: test-client-secret
  orchestrator:
    token: test-token
    repo-allowlist: backend/,frontend/,docs/
    workflow-protect-prefix: .github/workflows/
    github:
      app-id: ""
      private-key-path: ""
      installation-id: ""
    llm:
      endpoint: http://localhost:11434/v1
      model: test-model
      api-key: test-key
      proxy-host: ""
      proxy-port: 0
      fallback-endpoint: ""
      fallback-api-key: ""
    chat:
      memory-window-size: 5
    canvas:
      max-concurrent-bolts: 2
      sse-timeout-minutes: 5
      default-mode: EXECUTION
      enabled-agents: PM,QUALIFIER,ARCHITECT,DEVELOPER,REVIEW,TESTER,WRITER
