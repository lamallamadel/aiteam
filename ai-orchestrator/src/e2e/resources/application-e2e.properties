spring.flyway.enabled=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.hbm2ddl.auto=none
spring.jpa.properties.hibernate.validation.mode=none
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:e2edb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=

# Dummy OAuth2 configuration to bypass security context startup errors
spring.security.oauth2.client.registration.github.client-id=dummy-client-id
spring.security.oauth2.client.registration.github.client-secret=dummy-client-secret
spring.security.oauth2.client.registration.google.client-id=dummy-client-id
spring.security.oauth2.client.registration.google.client-secret=dummy-client-secret
spring.security.oauth2.client.registration.gitlab.client-id=dummy-client-id
spring.security.oauth2.client.registration.gitlab.client-secret=dummy-client-secret

# Mock Tokens for REST integrations
atlasia.github.token=mock-github-token

atlasia.jwt.secret-key=default-dev-secret-key-that-is-exactly-64-characters-long-for-hs512
atlasia.encryption.key=MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI=
atlasia.jwt.access-token-expiration-minutes=60
atlasia.jwt.refresh-token-expiration-days=30
atlasia.jwt.issuer=atlasia-test

atlasia.auth.e2e-test-token-enabled=true
atlasia.cors.allowed-origins=http://localhost:4200

spring.cloud.vault.enabled=false

atlasia.oauth2.github.client-id=test-client-id
atlasia.oauth2.github.client-secret=test-client-secret
atlasia.oauth2.google.client-id=test-client-id
atlasia.oauth2.google.client-secret=test-client-secret
atlasia.oauth2.gitlab.client-id=test-client-id
atlasia.oauth2.gitlab.client-secret=test-client-secret


# Turn off things we don't need for an E2E database integration
logging.level.root=INFO
spring.jpa.show-sql=false
logging.level.org.springframework.web=INFO
logging.level.com.atlasia.ai=DEBUG
logging.level.org.springframework.security=INFO
