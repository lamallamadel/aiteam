name: Container Security Scan

on:
  push:
    branches: [ develop ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan-backend:
    name: Scan AI Orchestrator Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: |
          cd ai-orchestrator
          docker build -t ai-orchestrator:${{ github.sha }} .

      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Pre-download Trivy vulnerability DB
        run: |
          for i in 1 2 3; do
            trivy image --download-db-only \
              --cache-dir "$GITHUB_WORKSPACE/.cache/trivy" \
              --timeout 15m && break
            echo "Attempt $i failed, retrying in 30s..."
            sleep 30
          done

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.34.1
        with:
          image-ref: ai-orchestrator:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-backend-results.sarif'
          severity: 'HIGH,CRITICAL'
          vuln-type: 'os,library'
          scanners: 'vuln,secret,misconfig'
          trivy-config: 'infra/trivy-config.yaml'
          skip-setup-trivy: true
          skip-db-update: true
          timeout: '15m'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-backend-results.sarif') != ''
        with:
          sarif_file: 'trivy-backend-results.sarif'
          category: 'container-backend'

      - name: Run Trivy for blocking on CRITICAL
        uses: aquasecurity/trivy-action@0.34.1
        with:
          image-ref: ai-orchestrator:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          vuln-type: 'os,library'
          scanners: 'vuln,secret,misconfig'
          trivy-config: 'infra/trivy-config.yaml'
          skip-setup-trivy: true
          skip-db-update: true
          timeout: '15m'

  scan-frontend:
    name: Scan Frontend Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend Docker image
        run: |
          cd frontend
          docker build -t frontend:${{ github.sha }} .

      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -qq
          sudo apt-get install -y trivy

      - name: Pre-download Trivy vulnerability DB
        run: |
          for i in 1 2 3; do
            trivy image --download-db-only \
              --cache-dir "$GITHUB_WORKSPACE/.cache/trivy" \
              --timeout 15m && break
            echo "Attempt $i failed, retrying in 30s..."
            sleep 30
          done

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.34.1
        with:
          image-ref: frontend:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-frontend-results.sarif'
          severity: 'HIGH,CRITICAL'
          vuln-type: 'os,library'
          scanners: 'vuln,secret,misconfig'
          trivy-config: 'infra/trivy-config.yaml'
          skip-setup-trivy: true
          skip-db-update: true
          timeout: '15m'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-frontend-results.sarif') != ''
        with:
          sarif_file: 'trivy-frontend-results.sarif'
          category: 'container-frontend'

      - name: Run Trivy for blocking on CRITICAL
        uses: aquasecurity/trivy-action@0.34.1
        with:
          image-ref: frontend:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'
          vuln-type: 'os,library'
          scanners: 'vuln,secret,misconfig'
          trivy-config: 'infra/trivy-config.yaml'
          skip-setup-trivy: true
          skip-db-update: true
          timeout: '15m'
