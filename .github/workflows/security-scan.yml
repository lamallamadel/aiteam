name: Security Scan

on:
  pull_request:
    branches:
      - main
      - develop
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Get week number for NVD cache key
        id: date
        run: echo "week=$(date +'%Y-%U')" >> $GITHUB_OUTPUT

      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check/data
          key: nvd-data-${{ runner.os }}-${{ steps.date.outputs.week }}
          restore-keys: |
            nvd-data-${{ runner.os }}-

      - name: Run OWASP Dependency Check
        working-directory: ai-orchestrator
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          ARGS="dependency-check:check -Psecurity-scan --batch-mode --no-transfer-progress"
          if [ -n "$NVD_API_KEY" ]; then
            ARGS="$ARGS -Dnvd.api.key=$NVD_API_KEY"
          fi
          ./mvnw $ARGS
        continue-on-error: true
      
      - name: Upload dependency check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: ai-orchestrator/target/dependency-check-report.*
          retention-days: 1
      
      - name: Parse vulnerability results
        if: always()
        id: parse_results
        working-directory: ai-orchestrator
        run: |
          if [ -f target/dependency-check-report.json ]; then
            # Extract vulnerability counts
            CRITICAL=$(jq '[.dependencies[].vulnerabilities[]? | select(.severity=="CRITICAL")] | length' target/dependency-check-report.json)
            HIGH=$(jq '[.dependencies[].vulnerabilities[]? | select(.severity=="HIGH")] | length' target/dependency-check-report.json)
            MEDIUM=$(jq '[.dependencies[].vulnerabilities[]? | select(.severity=="MEDIUM")] | length' target/dependency-check-report.json)
            LOW=$(jq '[.dependencies[].vulnerabilities[]? | select(.severity=="LOW")] | length' target/dependency-check-report.json)
            
            echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
            echo "high=$HIGH" >> $GITHUB_OUTPUT
            echo "medium=$MEDIUM" >> $GITHUB_OUTPUT
            echo "low=$LOW" >> $GITHUB_OUTPUT
            
            # Build summary
            SUMMARY="## đź”’ Security Scan Results\n\n"
            SUMMARY="${SUMMARY}### Vulnerability Summary\n"
            SUMMARY="${SUMMARY}| Severity | Count |\n"
            SUMMARY="${SUMMARY}|----------|-------|\n"
            SUMMARY="${SUMMARY}| đź”´ Critical | $CRITICAL |\n"
            SUMMARY="${SUMMARY}| đźź  High | $HIGH |\n"
            SUMMARY="${SUMMARY}| đźźˇ Medium | $MEDIUM |\n"
            SUMMARY="${SUMMARY}| âšŞ Low | $LOW |\n\n"
            
            if [ $((CRITICAL + HIGH)) -gt 0 ]; then
              SUMMARY="${SUMMARY}âš ď¸Ź **Action Required**: Critical or High severity vulnerabilities detected.\n\n"
            else
              SUMMARY="${SUMMARY}âś… No Critical or High severity vulnerabilities detected.\n\n"
            fi
            
            SUMMARY="${SUMMARY}View the detailed [Dependency Check Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for more information."
            
            echo "summary<<EOF" >> $GITHUB_OUTPUT
            echo -e "$SUMMARY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "summary=âš ď¸Ź Dependency check report not generated." >> $GITHUB_OUTPUT
            echo "critical=0" >> $GITHUB_OUTPUT
            echo "high=0" >> $GITHUB_OUTPUT
            echo "medium=0" >> $GITHUB_OUTPUT
            echo "low=0" >> $GITHUB_OUTPUT
          fi
      
      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `${{ steps.parse_results.outputs.summary }}`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
      
      - name: Fail if high/critical vulnerabilities found
        if: always()
        run: |
          CRITICAL=${{ steps.parse_results.outputs.critical }}
          HIGH=${{ steps.parse_results.outputs.high }}
          
          if [ $((CRITICAL + HIGH)) -gt 0 ]; then
            echo "âťŚ Found $CRITICAL critical and $HIGH high severity vulnerabilities"
            exit 1
          fi

  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      
      - name: Generate SBOM with CycloneDX
        working-directory: ai-orchestrator
        run: ./mvnw cyclonedx:makeAggregateBom -Psecurity-scan --batch-mode --no-transfer-progress
      
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: ai-orchestrator/target/bom.json
          retention-days: 1
      
      - name: Display SBOM summary
        working-directory: ai-orchestrator
        run: |
          if [ -f target/bom.json ]; then
            echo "âś… SBOM generated successfully"
            echo "đź“¦ Component count: $(jq '.components | length' target/bom.json)"
            echo "đź“„ Format: CycloneDX $(jq -r '.specVersion' target/bom.json)"
          fi
